<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KELIR-786 — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/chatBot/chatBot.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">
          <i class="bi bi-infinity" style="font-size:16px;"></i>
        </div>
        <span class="brand-name">KELIR-786</span>
      </div>
      <button class="icon-btn" id="collapse-btn" onclick="toggleSidebar()" title="Collapse">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>

    <button class="new-chat-btn" onclick="startNewChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>

    <!-- Chat History -->
    <div class="history-section">
      <p class="section-label">Chat History</p>
      <div class="history-list" id="history-list">
        <div class="history-empty">No conversations yet</div>
      </div>
    </div>

    <!-- Profile -->
    <div class="profile-card" id="profile-card">
      <div class="profile-avatar" id="profile-avatar">?</div>
      <div class="profile-info">
        <p class="profile-name" id="profile-name">Loading…</p>
        <p class="profile-email" id="profile-email"></p>
      </div>
      <div class="profile-menu-wrap">
        <button class="icon-btn" onclick="toggleProfileMenu()" id="profile-menu-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
        <div class="profile-dropdown hidden" id="profile-dropdown">
          <button onclick="openProfileModal()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            View Profile
          </button>
          <button class="danger" onclick="logout()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── Main ────────────────────────────────────────────────────── -->
  <main class="main" id="main">

    <!-- Header -->
    <header class="topbar">
      <button class="icon-btn" id="open-sidebar-btn" onclick="toggleSidebar()" title="Open sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <p class="topbar-title" id="topbar-title">KELIR</p>
      <div class="topbar-avatar" id="topbar-avatar" onclick="openProfileModal()">?</div>
    </header>

    <!-- Chat area -->
    <div class="chat-area" id="chat-area">
      <div class="welcome" id="welcome">

        <h2>How can I help you today?</h2>
        <p>Ask me anything — powered by advanced AI.</p>
        <div class="welcome-chips">
          <button onclick="fillPrompt('Explain quantum computing simply')">Explain quantum computing</button>
          <button onclick="fillPrompt('Write a Python function to sort a list')">Write Python code</button>
          <button onclick="fillPrompt('What are the best productivity tips?')">Productivity tips</button>
          <button onclick="fillPrompt('Summarize the history of the internet')">History of internet</button>
        </div>
      </div>
      <div class="messages" id="messages"></div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-box">
        <textarea
          id="user-input"
          placeholder="Message KELIR…"
          rows="1"
          onkeydown="handleKeydown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
        <p class="input-hint">KELIR can make mistakes. Verify important info.</p>
    </div>

  </main>

  <!-- ── Profile Modal ────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="profile-modal" onclick="closeProfileModal(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeProfileModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-avatar" id="modal-avatar">?</div>
      <h3 id="modal-name">—</h3>
      <p class="modal-email" id="modal-email">—</p>
      <div class="modal-stats">
        <div class="stat">
          <span class="stat-val" id="stat-chats">0</span>
          <span class="stat-label">Conversations</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-msgs">0</span>
          <span class="stat-label">Messages</span>
        </div>
      </div>
      <button class="btn-danger" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <script src="/chatBot/chatBot.js"></script>

</body>
</html>
